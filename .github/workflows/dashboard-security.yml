name: dashboard-security

on:
  push:
    paths:
      - '.github/workflows/dashboard-security.yml'
      - 'dashboard/**'
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'poetry.lock'
  pull_request:
    paths:
      - '.github/workflows/dashboard-security.yml'
      - 'dashboard/**'
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'poetry.lock'

jobs:
  dashboard-security:
    runs-on: ubuntu-latest
    env:
      INVESTMENT_AGENT_USE_INMEMORY_DB: "1"
      T212_API_KEY: public-ci-placeholder-key
      T212_API_SECRET: public-ci-placeholder-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: pip install poetry

      - name: Install Python dependencies
        run: poetry install

      - name: Run targeted dashboard backend tests
        run: poetry run pytest -q tests/test_dashboard_auth.py tests/test_dashboard_portfolio_stop_loss_routes.py tests/test_dashboard_public_routes.py

      - name: Run Bandit
        run: poetry run pip install bandit && poetry run bandit -q -r src dashboard/backend/app

      - name: Run pip-audit
        run: poetry run pip install pip-audit && poetry run pip-audit

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: dashboard/frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: dashboard/frontend
        run: npm test

      - name: Build frontend
        working-directory: dashboard/frontend
        run: npm run build

      - name: Run npm audit
        working-directory: dashboard/frontend
        run: npm audit --omit=dev --audit-level=high
