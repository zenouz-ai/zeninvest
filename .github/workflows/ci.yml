name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests
        run: >
          poetry run pytest -v
          --ignore=tests/test_dry_run_state.py
          --ignore=tests/test_integration_orchestrator.py
          --ignore=tests/test_notifications_integration.py
          --ignore=tests/test_state_machine_transitions.py
        env:
          INVESTMENT_AGENT_USE_INMEMORY_DB: "1"

      - name: Type check
        # ~88 pre-existing mypy errors from type stub gaps (pandas, yfinance,
        # ta, apscheduler, SQLAlchemy Column assignments). Runs and reports but
        # does not block CI until stubs are resolved. See CLAUDE.md.
        run: poetry run mypy src/
        continue-on-error: true
