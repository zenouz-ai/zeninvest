name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      INVESTMENT_AGENT_USE_INMEMORY_DB: "1"
      T212_API_KEY: public-ci-placeholder-key
      T212_API_SECRET: public-ci-placeholder-secret

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: .venv
          # `learning` suffix: invalidate caches from before `--with learning` so
          # the venv cannot be restored missing scikit-learn / lightgbm.
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}-with-learning-v1
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install dependencies
        # Include the optional `learning` group so the shadow ML pipeline tests
        # (calibrator / GBM / stall / dataset / insights / visualisations / CLI
        # smoke / dashboard router) can run end-to-end in CI. The `rl` group is
        # not installed here — d3rlpy-dependent code is gated behind
        # `pytest.importorskip("d3rlpy")` in the offline-RL tests.
        run: poetry install --sync --with learning --no-interaction

      - name: Run tests
        run: poetry run pytest -v

      - name: Type check
        # Pre-existing mypy errors, mostly type stub gaps (pandas, yfinance,
        # ta, apscheduler, SQLAlchemy Column assignments) plus Callable-alias
        # and variable-reuse false positives. Runs and reports but does not
        # block CI until stubs are resolved. See CLAUDE.md.
        run: poetry run mypy src/
        continue-on-error: true
