limit_req_zone $binary_remote_addr zone=dashboard_public:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=dashboard_auth:10m rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    server_name zeninvest.zenouz.ai;

    return 301 https://zeninvest.zenouz.ai$request_uri;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    return 301 https://zeninvest.zenouz.ai$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name zeninvest.zenouz.ai;

    resolver 127.0.0.11 valid=30s ipv6=off;
    set $dashboard_upstream http://dashboard:8000;

    ssl_certificate /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_prefer_server_ciphers off;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;

    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https: wss:; img-src 'self' data: https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data: https:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self';" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    location /api/events/stream {
        proxy_pass $dashboard_upstream;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    location = /api/auth/login {
        limit_req zone=dashboard_auth burst=10 nodelay;
        proxy_pass $dashboard_upstream;
        proxy_read_timeout 300s;
    }

    location ^~ /api/public/ {
        limit_req zone=dashboard_public burst=60 nodelay;
        proxy_pass $dashboard_upstream;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass $dashboard_upstream;
        proxy_read_timeout 300s;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    return 404;
}
