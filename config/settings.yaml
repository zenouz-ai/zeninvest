trading:
  mode: active
  account_type: practice  # practice = relaxed state machine (always ACTIVE); live = full CAUTIOUS/HALTED
  min_order_value_gbp: 500       # Minimum order-value floor; full market SELLs are allowed below this
  min_reduce_pct_of_position: 25  # Skip REDUCE below this % of position
  reduce_tiers_pct: [25, 50, 70, 100]  # Round REDUCE to nearest tier
  reduce_requires_gain_or_risk: true  # Only allow REDUCE for meaningful winners or explicit risk breaches
  reduce_min_unrealized_gain_pct: 10  # Minimum unrealized gain before REDUCE is allowed without a risk breach
  take_profit_full_sell_pct: 15  # Deterministic full SELL when unrealized gain reaches this threshold
  take_profit_allow_before_min_hold: true  # Allow take-profit SELL before the usual 24h minimum holding rule
  small_position_cleanup_enabled: true  # Liquidate residual holdings on the configured cleanup cycle
  small_position_cleanup_value_gbp: 200  # Full SELL holdings below this value during cleanup
  small_position_cleanup_cycle_local: "15:15"  # Final regular-session cleanup cycle in America/New_York
  small_position_cleanup_min_holding_hours: 24  # Do not cleanup positions bought within the last 24h
  base_url: https://demo.trading212.com/api/v0
  cycle_frequency: intraday  # standard = 2 fixed UTC cycles; intraday = 3 DST-aware market-session cycles
  schedule_mode: market_session  # market_session = America/New_York-local cycle times; fixed_utc = legacy UTC cron
  schedule_timezone: America/New_York
  cycle_hours: 4
  cycle_times_local: ["10:00", "12:30", "15:15"]
  cycle_times_utc: ["08:00", "12:00", "16:00"]
  market_days: [0, 1, 2, 3, 4]  # Mon-Fri
  skip_market_holidays: true     # Skip analysis cycles on NYSE holidays
  cycle_timeout_seconds: 1800    # Max seconds per cycle before timeout (30 min default)
  max_positions: 15
  min_position_pct: 2
  max_position_pct: 15
  cash_floor_pct: 10
  benchmark_ticker: "^GSPC"
  fx_aware_quantity: true   # Convert native-currency (USD/GBX) prices to GBP before quantity calculation

risk:
  min_holding_hours_before_reduce: 24  # Block REDUCE/SELL on positions held < 24h unless risk limit exceeded
  max_single_stock_pct: 20
  max_sector_pct: 40
  max_correlation: 0.7
  cautious_drawdown_pct: 30  # CAUTIOUS at 30% drawdown; practice-friendly (real money: consider 5/15)
  halt_drawdown_pct: 40     # HALTED at 40% drawdown
  daily_loss_halt_pct: 2
  vix_high: 25
  vix_extreme: 35
  min_positions: 5
  risk_parity_enabled: true
  risk_parity_lookback_days: 60
  risk_parity_vol_floor: 0.05
  risk_parity_target_vol: 0.15

strategy:
  momentum_weight: 0.35
  mean_reversion_weight: 0.30
  factor_weight: 0.35
  min_conviction: 68
  min_conviction_no_moderators: 78
  min_conviction_one_moderator: 68

moderation:
  require_consensus: true
  consensus_threshold: 2

models:
  strategy: claude-sonnet-4-5-20250929
  moderator_1: gpt-4o
  moderator_2: gemini-2.5-flash

data_providers:
  finnhub_base_url: https://finnhub.io/api/v1
  alpha_vantage_base_url: https://www.alphavantage.co/query
  macro_intelligence_enabled: true
  volume_signals_enabled: true   # US-4.1: compute OBV + 20-day volume ratio for signal confirmation
  sector_fallback_yfinance: true  # Use SPDR ETFs when Alpha Vantage SECTOR fails
  cache_ttl_hours:
    ohlcv_indicators: 4
    fundamentals: 12
    finnhub_analyst: 6
    alpha_vantage_broad: 4
    alpha_vantage_ticker: 4
    macro_intelligence: 4

macro:
  proactive_scan_enabled: true   # US-4.5: independent scheduled macro scan (keep off until implemented)
  scan_time_utc: "06:00"          # Daily macro scan time; separate from trading cycles
  signal_log_enabled: true        # Persist normalized macro signal audit entries when proactive scan runs
  second_order_reasoning_enabled: true  # Enable LLM-generated macro_action_plan after Phase A/C land
  persist_headlines: true          # Archive Finnhub headlines to macro_headlines for World News dashboard tab
  research_routing_mode: static_first    # static_first | followup_on_materiality | bounded_mini_research
  search_provider_policy: brave_primary_tavily_fallback  # Matches US-4.4 production default

universe:
  max_candidates: 40          # Max new stocks to screen per cycle (increased from 30)
  candidates_per_sector: 5    # Min candidates sampled from each sector
  large_cap_pct: 0.60         # candidates from large cap ($10B+)
  mid_cap_pct: 0.30           # from mid cap ($2B-$10B)
  small_cap_pct: 0.10         # from small cap ($300M-$2B)
  large_cap_min: 10000000000  # $10B
  mid_cap_min: 2000000000     # $2B
  small_cap_min: 300000000    # $300M
  screening_cooldown_hours: 12  # Base hours before re-screening
  effective_screening_cooldown_override: 4  # Allow the next intraday cycle to reconsider the prior pool
  review_cooldown_days: 2  # Faster autonomous re-review cadence for swing trading
  max_reviews_per_30_days: 10  # Higher autonomous re-review cap for active swing rotation
  uninvestigated_target_pct: 0.5  # Target share of per-cycle candidates that have never been investigated (approx)
  batch_enrichment_enabled: true   # Scheduled job to enrich instruments missing sector/market_cap
  batch_enrichment_per_run: 50     # Max instruments to enrich per scheduler run
  data_fallback_web_search_enabled: true  # Use Brave/Tavily for analyst/news when Finnhub/AV fail or time out

cost_limits:
  anthropic_daily_gbp: 2
  openai_daily_gbp: 1
  google_daily_gbp: 1
  total_monthly_gbp: 60.00
  alert_threshold_pct: 80

# Search API monthly call limits (project-wide) — Brave, Tavily for enrichment + research
search_api_limits:
  brave_search_monthly_calls: 2000
  brave_answer_monthly_calls: 2000
  tavily_monthly_calls: 1000  # 1000 for research spec; shared with enrichment/fallback

# Agentic research (US-4.4) — tool-use for Strategy, Skeptic, Risk
research:
  enabled: true
  strategy_research_enabled: true   # Enable tool-use in Strategy when research.enabled
  skeptic_research_enabled: true    # Enable tool-use in GPT-4o Skeptic
  risk_research_enabled: true       # Enable tool-use in Gemini Risk
  max_calls_per_member_per_cycle:
    strategy: 20
    skeptic: 8
    risk: 7
  max_total_research_calls_per_cycle: 35

opportunity:
  enabled: true
  mode: active  # shadow|active
  immediate_threshold_z: 0.0  # allow more approved buys to execute in the same cycle
  queue_threshold_z: -0.15    # keep more borderline candidates queued instead of filtering them out
  queue_ttl_cycles: 6       # extended to give queued tickers more cycles to promote
  swap_delta_z: 1.0
  ewma_half_life_cycles: 6
  weights:
    momentum: 0.12
    mean_reversion: 0.10
    factor_composite: 0.20
    factor_quality: 0.08
    factor_value: 0.05
    conviction: 0.15
    expected_holding_period: 0.05
    gpt_verdict: 0.05
    gemini_growth_vs_risk: 0.08
    gemini_confidence: 0.04
    news_sentiment: 0.05
    market_cap: 0.03
  penalties:
    strategy_hold: -0.8
    strategy_queued: -0.6   # Less punitive than hold (potential BUY next cycle)
    moderation_blocked: -1.2
    risk_reject: -1.6
    risk_resize: -0.35
    unrated: -0.6

order_management:
  enabled: true
  default_stop_loss_pct: -10       # Default stop-loss % when placing missing stops (no ATR or no decision)
  reassess_stops: true            # Reassess stop-losses each cycle based on ATR
  trailing_stops:
    enabled: true                 # Software-based trailing stops (cancel + replace)
    default_trail_pct: 5.0        # Trail distance as % below high-water mark
    min_profit_pct: 10.0          # Only trail positions with unrealised P&L > this %
  limit_orders:
    enabled: true                 # Allow limit orders for dip-buy entries
    default_offset_pct: 2.0       # Default % below current price for limit buys
    time_validity: GTC            # DAY or GTC
  atr_multiplier: 2.0            # ATR multiplier for volatility-based stop distance
  min_stop_distance_pct: 3.0     # Never place stop closer than this % below price
  max_stop_distance_pct: 15.0    # Never place stop further than this % below price
  only_tighten_stops: true       # Only move stops up, never widen them

notifications:
  enabled: true
  channels: ["slack", "email"]
  routes:
    trade_instruction_approved: ["slack"]
    trade_execution_result: ["slack", "email"]
    cycle_run_summary: ["slack"]
    state_transition: ["slack", "email"]
    critical_cycle_failure: ["slack", "email"]
    order_adjustment: ["slack"]
    trade_without_stop: ["slack", "email"]
  timeout_seconds: 5
  max_retries: 2
  dedup_window_seconds: 300
  include_dry_run_alerts: false
  command_gateway:
    enabled: true
  slack_trade_commands:
    enabled: true
    channel_id: "C0ANG26SBD0"
    confirmation_threshold_gbp: 2000
    confirmation_timeout_minutes: 10
    worker_count: 1

dashboard:
  enabled: true
  events_enabled: true
  sse_poll_interval_seconds: 5
  # CORS origins for dashboard API.
  # Default (when absent): https://zeninvest.zenouz.ai plus localhost dev origins.
  # cors_origins:
  #   - "https://zeninvest.zenouz.ai"
  #   - "http://localhost:3000"
  # Operator auth is configured via .env:
  #   DASHBOARD_OPERATOR_USERNAME
  #   DASHBOARD_OPERATOR_PASSWORD_HASH
  #   DASHBOARD_SESSION_SECRET
  # Public read-only APIs live under /api/public/*.
  # Operator login is blocked over plain HTTP except localhost-only dev mode
  # with DASHBOARD_INSECURE_DEV_MODE=true.
