trading:
  mode: active
  account_type: practice  # practice = relaxed state machine (always ACTIVE); live = full CAUTIOUS/HALTED
  min_order_value_gbp: 200       # Minimum BUY order-value floor
  min_reduce_pct_of_position: 25  # Skip REDUCE below this % of position
  reduce_tiers_pct: [50]  # REDUCE is intentionally rare: only 50% trims are allowed
  sell_min_profit_pct: 10  # Ordinary autonomous SELL requires at least this unrealized gain unless hard-exit
  reduce_25_min_profit_pct: 25  # REDUCE 25% only when unrealized gain reaches this threshold
  reduce_50_min_profit_pct: 40  # REDUCE 50% only when unrealized gain reaches this threshold
  buy_whole_shares_preferred: true  # Prefer integer-share autonomous buys
  buy_whole_share_max_overspend_pct: 10  # Allow modest overspend to land on a whole-share quantity
  buy_fractional_fallback_enabled: true  # Use fractional shares only when whole-share buy cannot satisfy rules
  take_profit_full_sell_pct: 10  # Legacy compatibility threshold retained for reporting/backward compatibility
  small_position_cleanup_enabled: true  # Liquidate residual holdings immediately before strategy runs
  small_position_cleanup_value_gbp: 100  # Full SELL any holding below this value without strategy/moderation/risk
  stagnation_exit_enabled: true  # Deterministic SELL for positions whose profit-per-day-held falls below the floor
  stagnation_min_days: 12  # Evaluate stagnation after this many days held (pace-aligned; was 15)
  stagnation_min_profit_per_day_pct: null  # null + stagnation_use_pace_threshold=true => learning.success_min_profit_per_day_pct (0.25)
  stagnation_use_pace_threshold: true  # Single source: inherit winner threshold from learning block (ADR-005)
  stagnation_grace_by_pace: true  # Exempt positions with unrealized gain/day >= winner threshold
  stagnation_grace_pnl_pct: null  # Optional absolute pnl_pct grace (used when stagnation_grace_by_pace is false)
  slow_bleed_exit_enabled: true  # Exit slow losers when gain/day < stall floor before hard stop
  slow_bleed_min_days: 10  # Minimum hold before slow-bleed evaluation
  pace_aware_sell_enabled: false  # Allow gain_realization SELL below sell_min_profit_pct when pace >= winner threshold
  base_url: https://demo.trading212.com/api/v0
  cycle_frequency: intraday  # standard = 2 fixed UTC cycles; intraday = 3 DST-aware market-session cycles
  schedule_mode: market_session  # market_session = America/New_York-local cycle times; fixed_utc = legacy UTC cron
  schedule_timezone: America/New_York
  cycle_hours: 4
  cycle_times_local: ["10:00", "12:30", "15:15"]
  cycle_times_utc: ["08:00", "12:00", "16:00"]
  market_days: [0, 1, 2, 3, 4]  # Mon-Fri
  skip_market_holidays: true     # Skip analysis cycles on NYSE holidays
  cycle_timeout_seconds: 1800    # Max seconds per cycle before timeout (30 min default)
  max_positions: 35
  min_position_pct: 2
  max_position_pct: 15
  cash_floor_pct: 10
  benchmark_ticker: "^GSPC"
  fx_aware_quantity: true   # Convert native-currency (USD/GBX) prices to GBP before quantity calculation
  allow_off_hours_orders: true  # Allow orders outside the regular market session, but annotate them clearly

risk:
  min_holding_hours_before_reduce: 24  # Block REDUCE/SELL on positions held < 24h unless risk limit exceeded
  max_single_stock_pct: 20
  max_sector_pct: 40
  max_correlation: 0.7
  correlation_warning_threshold: 0.6
  correlation_warning_lookback_days: 60
  correlation_warning_min_history_days: 20
  cautious_drawdown_pct: 30  # CAUTIOUS at 30% drawdown; practice-friendly (real money: consider 5/15)
  halt_drawdown_pct: 40     # HALTED at 40% drawdown
  daily_loss_halt_pct: 2
  vix_high: 25
  vix_extreme: 35
  min_positions: 5
  risk_parity_enabled: true
  risk_parity_lookback_days: 60
  risk_parity_vol_floor: 0.05
  risk_parity_target_vol: 0.15
  halted_auto_recovery_enabled: true
  halted_auto_recovery_consecutive_cycles: 3
  peak_inflation_guard_enabled: true
  peak_inflation_multiplier: 2.0
  peak_inflation_lookback_snapshots: 5

strategy:
  momentum_weight: 0.35
  mean_reversion_weight: 0.30
  factor_weight: 0.35
  min_conviction: 70
  min_conviction_no_moderators: 78
  min_conviction_one_moderator: 70
  avoid_pre_earnings: true
  pre_earnings_window_trading_days: 5
  post_earnings_drift_window_trading_days: 10

moderation:
  require_consensus: true
  consensus_threshold: 2
  parallel_enabled: true   # US-9.5: run GPT-4o + Gemini moderators concurrently (kill switch)
  debate_enabled: true     # Multi-turn committee debate: moderators see + rebut each other before final verdict
  debate_rounds: 2         # 1 = opening one-shot only (legacy); 2 = opening + one simultaneous rebuttal round
  debate_anonymize: true   # Present each peer's argument anonymously (reduces identity/model bias)

models:
  strategy: claude-sonnet-4-5-20250929
  moderator_1: gpt-4o
  moderator_2: gemini-2.5-flash

data_providers:
  finnhub_base_url: https://finnhub.io/api/v1
  alpha_vantage_base_url: https://www.alphavantage.co/query
  macro_intelligence_enabled: true
  volume_signals_enabled: true   # US-4.1: compute OBV + 20-day volume ratio for signal confirmation
  earnings_calendar_enabled: true
  sector_fallback_yfinance: true  # Use SPDR ETFs when Alpha Vantage SECTOR fails
  cache_ttl_hours:
    ohlcv_indicators: 4
    fundamentals: 12
    finnhub_analyst: 6
    alpha_vantage_broad: 4
    alpha_vantage_ticker: 4
    macro_intelligence: 4

macro:
  proactive_scan_enabled: true   # US-4.5: independent scheduled macro scan (keep off until implemented)
  scan_time_utc: "06:00"          # Daily macro scan time; separate from trading cycles
  signal_log_enabled: true        # Persist normalized macro signal audit entries when proactive scan runs
  second_order_reasoning_enabled: true  # Enable LLM-generated macro_action_plan after Phase A/C land
  persist_headlines: true          # Archive Finnhub headlines to macro_headlines for World News dashboard tab
  research_routing_mode: static_first    # static_first | followup_on_materiality | bounded_mini_research
  search_provider_policy: brave_primary_tavily_fallback  # Matches US-4.4 production default

guidance:
  enabled: true
  mode: active   # active | shadow
  trade_outcome_min_sample: 12
  staleness_hours: 48

universe:
  max_candidates: 50          # Max new stocks to screen per cycle (increased from 40 for higher new-ticker throughput)
  candidates_per_sector: 5    # Min candidates sampled from each sector
  large_cap_pct: 0.50         # candidates from large cap ($10B+)
  mid_cap_pct: 0.30           # from mid cap ($2B-$10B)
  small_cap_pct: 0.20         # from small cap ($300M-$2B)
  large_cap_min: 10000000000  # $10B
  mid_cap_min: 2000000000     # $2B
  small_cap_min: 300000000    # $300M
  screening_cooldown_hours: 12  # Base hours before re-screening
  effective_screening_cooldown_override: 4  # Allow the next intraday cycle to reconsider the prior pool
  review_cooldown_days: 2  # Faster autonomous re-review cadence for swing trading
  max_reviews_per_30_days: 10  # Higher autonomous re-review cap for active swing rotation
  uninvestigated_target_pct: 0.65  # Target share of per-cycle candidates that have never been investigated (raised to bias toward new tickers without raising reviews)
  never_reviewed_priority: true  # Prioritize never-investigated / oldest-screened tickers in screener sampling
  batch_enrichment_enabled: true   # Scheduled job to enrich instruments missing sector/market_cap
  batch_enrichment_per_run: 50     # Max instruments to enrich per scheduler run
  data_fallback_web_search_enabled: true  # Use Brave/Tavily for analyst/news when Finnhub/AV fail or time out

cost_limits:
  anthropic_daily_gbp: 2
  openai_daily_gbp: 1
  google_daily_gbp: 1
  total_monthly_gbp: 60.00
  alert_threshold_pct: 80

# Search API monthly call limits (project-wide) — Brave, Tavily for enrichment + research
search_api_limits:
  brave_search_monthly_calls: 2000
  brave_answer_monthly_calls: 2000
  tavily_monthly_calls: 1000  # 1000 for research spec; shared with enrichment/fallback

# Agentic research (US-4.4) — tool-use for Strategy, Skeptic, Risk
research:
  enabled: true
  strategy_research_enabled: true   # Enable tool-use in Strategy when research.enabled
  skeptic_research_enabled: true    # Enable tool-use in GPT-4o Skeptic
  risk_research_enabled: true       # Enable tool-use in Gemini Risk
  max_calls_per_member_per_cycle:
    strategy: 20
    skeptic: 8
    risk: 7
  max_total_research_calls_per_cycle: 35

opportunity:
  enabled: true
  mode: active  # shadow|active
  immediate_threshold_z: -0.2  # execute more approved buys in the same cycle (capacity/cash still gate); raised throughput
  queue_threshold_z: -0.35    # retain more borderline approved candidates in the queue for promotion instead of dropping them
  queue_ttl_cycles: 8       # longer runway for queued tickers to promote as slots free up
  swap_delta_z: 1.0
  ewma_half_life_cycles: 6
  weights:
    momentum: 0.12
    mean_reversion: 0.10
    factor_composite: 0.20
    factor_quality: 0.08
    factor_value: 0.05
    conviction: 0.15
    expected_holding_period: 0.05
    gpt_verdict: 0.05
    gemini_growth_vs_risk: 0.08
    gemini_confidence: 0.04
    news_sentiment: 0.05
    market_cap: 0.03
  penalties:
    strategy_hold: -0.8
    strategy_queued: -0.6   # Less punitive than hold (potential BUY next cycle)
    moderation_blocked: -1.2
    risk_reject: -1.6
    risk_resize: -0.35
    unrated: -0.6

intraday_refresh:
  enabled: true
  pre_cycle_offset_minutes: 10
  post_cycle_offset_minutes: 10
  weekend_enabled: true
  weekend_time_local: "17:00"
  weekend_days: [5, 6]  # Sat, Sun
  market_data_scope: held_pending_queued
  auto_actions_mode: deterministic_exits

order_management:
  enabled: true
  default_stop_loss_pct: -12       # Default stop-loss % when placing missing stops (no ATR or no decision)
  resubmit_partial_fills: true     # Retry eligible cancelled partial BUY remainders once when a later cycle still approves the BUY
  reassess_stops: true            # Reassess stop-losses each cycle based on ATR
  wallet_reconcile_per_cycle_enabled: true   # Run cheap incremental GBP wallet reconcile after each broker sync (full backfill via --reconcile-wallets)
  wallet_reconcile_lookback_days: 7          # Incremental reconcile window: only re-scan tickers with orders placed within N days (plus any missing GBP truth)
  wallet_reconcile_max_seconds: 120          # Wall-clock budget for per-cycle reconcile so it never overruns the cycle lock
  execution_quality:
    enabled: true
    alert_window_days: 7
    warning_threshold_bps: 25.0
    warning_min_fills: 5
  trailing_stops:
    enabled: true                 # Software-based trailing stops (cancel + replace)
    default_trail_pct: 10.0       # Trail distance as % below high-water mark
    min_profit_pct: 20.0          # Only trail positions with unrealised P&L > this %
    pace_trigger_enabled: true    # Also activate trailing when unrealized gain/day >= winner threshold
    min_gain_per_day_pct: null    # null => learning.success_min_profit_per_day_pct
  profit_lock_tiers:
    enabled: true                 # Tiered profit-lock floors integrated with ATR/trailing stops
    tiers:
      - unrealized_gain_pct: 3.5
        min_lock_pct: 1.0
      - unrealized_gain_pct: 5.0
        min_lock_pct: 2.0
      - unrealized_gain_pct: 8.0
        min_lock_pct: 5.0
      - unrealized_gain_pct: 15.0
        min_lock_pct: 10.0
      - unrealized_gain_pct: 25.0
        min_lock_pct: 15.0
      - unrealized_gain_pct: 50.0
        min_lock_pct: 25.0
  limit_orders:
    enabled: true                 # Allow limit orders for dip-buy entries
    default_offset_pct: 2.0       # Default % below current price for limit buys
    time_validity: GTC            # DAY or GTC
  atr_multiplier: 2.0            # ATR multiplier for volatility-based stop distance
  min_stop_distance_pct: 3.0     # Never place stop closer than this % below price
  max_stop_distance_pct: 15.0    # Never place stop further than this % below price
  only_tighten_stops: true       # Only move stops up, never widen them

notifications:
  enabled: true
  channels: ["slack", "email"]
  routes:
    trade_instruction_approved: ["slack"]
    trade_execution_result: ["slack", "email"]
    cycle_run_summary: ["slack"]
    state_transition: ["slack", "email"]
    critical_cycle_failure: ["slack", "email"]
    order_adjustment: ["slack"]
    trade_without_stop: ["slack", "email"]
    execution_quality_alert: ["slack"]
    learning_alert: ["slack", "email"]
  timeout_seconds: 5
  max_retries: 2
  dedup_window_seconds: 300
  include_dry_run_alerts: false
  command_gateway:
    enabled: true
  slack_trade_commands:
    enabled: true
    channel_id: "C0ANG26SBD0"
    confirmation_threshold_gbp: 2000
    confirmation_timeout_minutes: 10
    worker_count: 1

dashboard:
  enabled: true
  events_enabled: true
  sse_poll_interval_seconds: 5
  # CORS origins for dashboard API.
  # Default (when absent): your chosen dashboard origin plus localhost dev origins.
  # cors_origins:
  #   - "https://dashboard.example.com"
  #   - "http://localhost:3000"
  # Operator auth is configured via .env:
  #   DASHBOARD_OPERATOR_USERNAME
  #   DASHBOARD_OPERATOR_PASSWORD_HASH
  #   DASHBOARD_SESSION_SECRET
  # Public read-only APIs live under /api/public/*.
  # Operator login is blocked over plain HTTP except localhost-only dev mode
  # with DASHBOARD_INSECURE_DEV_MODE=true.

conversation:
  enabled: true
  confirmation_timeout_minutes: 10
  inactivity_timeout_minutes: 480
  max_session_list_size: 50
  agentic_planner_enabled: true
  transparency_enabled: true
  default_mode: research
  default_budget_tier: premium
  proactive_suggestions_enabled: true
  planner_model: gpt-4o
  specialist_models:
    equity: claude-sonnet-4-5-20250929
    risk: gemini-2.5-flash
  max_specialist_calls_per_turn: 3
  max_research_calls_per_turn: 4
  native_web_search_enabled: false
  beta_shadow_logging_enabled: true
  chat_llm_daily_budget_gbp: 0.50           # Separate daily budget for chat LLM calls (does not consume scheduled cycle budgets)

learning:
  export_enabled: true
  export_day_of_week: sun
  export_time_utc: "13:00"
  export_train_enabled: false
  export_sync_embeddings_enabled: false   # optional post-export vector index build (respects embedding budget)
  export_dataset_version: v6
  success_min_profit_per_day_pct: 0.25
  stall_min_gain_per_day_pct: -0.05
  embeddings_enabled: false
  embedding_daily_budget_gbp: 0.25
  memory_inject_strategy: false
  neo4j_uri: bolt://neo4j:7687
  neo4j_user: neo4j
  graphiti_enabled: false
  shadow_scoring_enabled: true
  shadow_policies:
    - challenger_gbm
    - challenger_memory
    - challenger_combined
  evaluate_enabled: true
  evaluate_day_of_week: sun
  evaluate_time_utc: "14:00"
  gbm_veto_threshold: 0.35
  gbm_prioritize_threshold: 0.40
  memory_veto_threshold: 0.5
  mlflow_enabled: false
  mlflow_uri: "file:./data/learning/mlflow"
  alerts_enabled: true
  alerts_shadow_disagreement_threshold: 0.5
  alerts_min_shadow_scores: 20
