<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00ffa3"/>
    </linearGradient>
    <linearGradient id="e" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00ffa3"/>
    </linearGradient>
  </defs>
  <!-- Simplified 5-node Z for small sizes -->
  <!-- Top bar: 2 nodes -->
  <line x1="14" y1="16" x2="50" y2="16" stroke="url(#e)" stroke-width="3" opacity="0.7"/>
  <circle cx="14" cy="16" r="5" fill="url(#g)"/>
  <circle cx="50" cy="16" r="5" fill="url(#g)"/>
  <!-- Diagonal with centre node -->
  <line x1="50" y1="16" x2="32" y2="32" stroke="url(#e)" stroke-width="3" opacity="0.7"/>
  <line x1="32" y1="32" x2="14" y2="48" stroke="url(#e)" stroke-width="3" opacity="0.7"/>
  <circle cx="32" cy="32" r="5.5" fill="url(#g)"/>
  <!-- Bottom bar: 2 nodes -->
  <line x1="14" y1="48" x2="50" y2="48" stroke="url(#e)" stroke-width="3" opacity="0.7"/>
  <circle cx="14" cy="48" r="5" fill="url(#g)"/>
  <circle cx="50" cy="48" r="5" fill="url(#g)"/>
</svg>
