services:
  investment-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: investment-agent
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./journals:/app/journals
      - ./logs:/app/logs
      - ./backtests/results:/app/backtests/results
    healthcheck:
      test: ["CMD", "python", "-c", "import src; print('ok')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  slack-listener:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: investment-slack-listener
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./journals:/app/journals
      - ./logs:/app/logs
    command: ["sh", "-c", "alembic upgrade head && python -m src.agents.notifications.slack_trade_listener"]
    depends_on:
      - investment-agent

  dashboard:
    build:
      context: .
    container_name: investment-dashboard
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./journals:/app/journals
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    command: ["python", "-m", "dashboard.backend.server"]
    depends_on:
      - investment-agent

# Reverse-proxy / TLS setup is intentionally omitted from the public mirror.
