services:
  investment-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: investment-agent
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./journals:/app/journals
      - ./logs:/app/logs
      - ./backtests/results:/app/backtests/results
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "python", "-c", "import src; print('ok')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  slack-listener:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: investment-slack-listener
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./journals:/app/journals
      - ./logs:/app/logs
    command: ["sh", "-c", "alembic upgrade head && python -m src.agents.notifications.slack_trade_listener"]
    depends_on:
      - investment-agent

  dashboard:
    build:
      context: .
      # DASHBOARD_API_KEY is forwarded as a build arg so the frontend bundle
      # can embed it as VITE_API_KEY at compile time.
      args:
        - DASHBOARD_API_KEY
    container_name: investment-dashboard
    restart: always
    env_file:
      - .env
    # DASHBOARD_API_KEY must also be present at runtime for the backend middleware.
    environment:
      - DASHBOARD_API_KEY=${DASHBOARD_API_KEY:-}
    volumes:
      - ./data:/app/data
      - ./journals:/app/journals
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    command: ["uvicorn", "dashboard.backend.app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      - investment-agent
