services:
  investment-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: investment-agent
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./journals:/app/journals
      - ./logs:/app/logs
      - ./backtests/results:/app/backtests/results
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "python", "-c", "import src; print('ok')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  slack-listener:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: investment-slack-listener
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./journals:/app/journals
      - ./logs:/app/logs
    command: ["sh", "-c", "alembic upgrade head && python -m src.agents.notifications.slack_trade_listener"]
    depends_on:
      - investment-agent

  dashboard:
    build:
      context: .
    container_name: investment-dashboard
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./journals:/app/journals
      - ./logs:/app/logs
    expose:
      - "8000"
    command: ["python", "-m", "dashboard.backend.server"]
    depends_on:
      - investment-agent

  nginx:
    image: nginx:alpine
    container_name: investment-dashboard-nginx
    restart: always
    depends_on:
      - dashboard
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - /home/deploy_invest_ai/certs/zeninvest.zenouz.ai:/etc/nginx/certs:ro
